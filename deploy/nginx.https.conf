events {}

http {
  include /etc/nginx/mime.types;

  server_tokens off;
  client_max_body_size 20m;
  map_hash_bucket_size 128;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/rss+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/xml
    font/opentype
    image/svg+xml
    text/css
    text/plain
    text/xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  map $request_method $masterbudet_public_upload_key {
    default "";
    POST $binary_remote_addr;
  }

  map $request_method $masterbudet_customer_phone_auth_key {
    default "";
    POST $binary_remote_addr;
  }

  map "$request_method:$uri" $masterbudet_customer_session_auth_key {
    default "";
    POST:/api/v1/auth/customer/session/refresh/web $binary_remote_addr;
    POST:/api/v1/auth/customer/session/refresh/mobile $binary_remote_addr;
    POST:/api/v1/auth/customer/session/logout/web $binary_remote_addr;
    POST:/api/v1/auth/customer/session/logout/mobile $binary_remote_addr;
  }

  limit_req_zone $binary_remote_addr zone=masterbudet_customer_lookup:10m rate=12r/m;
  limit_req_zone $masterbudet_public_upload_key zone=masterbudet_public_upload:10m rate=1r/m;
  limit_req_zone $masterbudet_customer_phone_auth_key zone=masterbudet_customer_phone_auth:10m rate=30r/m;
  limit_req_zone $masterbudet_customer_session_auth_key zone=masterbudet_customer_session_auth:10m rate=60r/m;

  upstream leadvirt_api {
    server api:4001;
  }

  upstream leadvirt_web {
    server web:3001;
  }

  server {
    listen 80 default_server;
    server_name _;

    return 444;
  }

  server {
    listen 80;
    server_name leadvirt.com www.leadvirt.com;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 308 https://leadvirt.com$request_uri;
    }
  }

  server {
    listen 80;
    server_name masterbudet.ru www.masterbudet.ru;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 308 https://masterbudet.ru$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name masterbudet.ru;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $masterbudet_backend http://masterbudet-backend:4000;
    set $masterbudet_frontend http://masterbudet-frontend:3000;

    ssl_certificate /etc/letsencrypt/live/masterbudet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masterbudet.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 429 = @masterbudet_customer_lookup_rate_limited;

    location @masterbudet_customer_lookup_rate_limited {
      default_type application/json;
      add_header Retry-After 5 always;
      return 429 '{"statusCode":429,"code":"CUSTOMER_LOOKUP_RATE_LIMITED","message":"Too many customer order access checks. Try again shortly.","retryAfterSeconds":5}';
    }

    location @masterbudet_public_upload_rate_limited {
      default_type application/json;
      add_header Retry-After 60 always;
      return 429 '{"statusCode":429,"code":"PUBLIC_UPLOAD_RATE_LIMITED","message":"Too many photo upload attempts. Try again shortly.","retryAfterSeconds":60}';
    }

    location @masterbudet_customer_phone_auth_rate_limited {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      add_header Retry-After 2 always;
      return 429 '{"statusCode":429,"code":"CUSTOMER_AUTH_RATE_LIMITED","message":"Too many authentication attempts. Try again shortly.","retryAfterSeconds":2}';
    }

    location @masterbudet_customer_session_auth_rate_limited {
      default_type application/json;
      add_header Cache-Control "no-store" always;
      add_header Retry-After 1 always;
      return 429 '{"statusCode":429,"code":"CUSTOMER_AUTH_RATE_LIMITED","message":"Too many authentication attempts. Try again shortly.","retryAfterSeconds":1}';
    }

    location @masterbudet_public_upload_too_large {
      default_type application/json;
      return 413 '{"statusCode":413,"code":"PUBLIC_UPLOAD_TOO_LARGE","message":"Photo file must be no larger than 5 MB.","maxFileSizeBytes":5242880}';
    }

    location = /health {
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/orders/lookup {
      limit_req zone=masterbudet_customer_lookup burst=4 nodelay;
      limit_req_status 429;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v1/orders/ {
      limit_req zone=masterbudet_customer_lookup burst=4 nodelay;
      limit_req_status 429;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /api/v1/client/ {
      limit_req zone=masterbudet_customer_lookup burst=4 nodelay;
      limit_req_status 429;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/otp/request {
      limit_req zone=masterbudet_customer_phone_auth burst=10 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_phone_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/otp/verify/web {
      limit_req zone=masterbudet_customer_phone_auth burst=10 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_phone_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/otp/verify/mobile {
      limit_req zone=masterbudet_customer_phone_auth burst=10 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_phone_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/session/refresh/web {
      limit_req zone=masterbudet_customer_session_auth burst=20 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_session_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/session/refresh/mobile {
      limit_req zone=masterbudet_customer_session_auth burst=20 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_session_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/session/logout/web {
      limit_req zone=masterbudet_customer_session_auth burst=20 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_session_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/customer/session/logout/mobile {
      limit_req zone=masterbudet_customer_session_auth burst=20 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_customer_session_auth_rate_limited;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/uploads/order-photos {
      client_max_body_size 6m;
      limit_req zone=masterbudet_public_upload burst=7 nodelay;
      limit_req_status 429;
      error_page 429 = @masterbudet_public_upload_rate_limited;
      error_page 413 = @masterbudet_public_upload_too_large;
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/uploads/order-photos/ {
      return 404;
    }

    location /api/ {
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /uploads/ {
      proxy_pass $masterbudet_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      proxy_pass $masterbudet_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name www.masterbudet.ru;

    ssl_certificate /etc/letsencrypt/live/masterbudet.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/masterbudet.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      return 308 https://masterbudet.ru$request_uri;
    }
  }

  server {
    listen 443 ssl default_server;
    ssl_reject_handshake on;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name leadvirt.com;

    ssl_certificate /etc/letsencrypt/live/leadvirt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadvirt.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /health {
      proxy_pass http://leadvirt_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location = /health/ready {
      proxy_pass http://leadvirt_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
      proxy_pass http://leadvirt_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      proxy_pass http://leadvirt_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name www.leadvirt.com;

    ssl_certificate /etc/letsencrypt/live/leadvirt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadvirt.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
      return 308 https://leadvirt.com$request_uri;
    }
  }

}
