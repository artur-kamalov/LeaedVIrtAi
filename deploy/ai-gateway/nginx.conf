events {}

http {
  resolver 1.1.1.1 1.0.0.1 ipv6=off valid=300s;

  server_tokens off;
  client_max_body_size 10m;

  gzip on;
  gzip_types application/json text/plain;

  server {
    listen 80;
    server_name 147-90-14-240.sslip.io;

    location = /health {
      return 200 "ok";
    }

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 308 https://$host:8443$request_uri;
    }
  }

  server {
    listen 8443 ssl;
    http2 on;
    server_name 147-90-14-240.sslip.io;

    ssl_certificate /etc/letsencrypt/live/147-90-14-240.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/147-90-14-240.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
      allow 193.187.92.88;
      deny all;

      proxy_pass https://api.openai.com;
      proxy_http_version 1.1;
      proxy_ssl_server_name on;
      proxy_ssl_name api.openai.com;
      proxy_set_header Host api.openai.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
