x-leadvirt-app: &leadvirt-app
  image: leadvirt-app:${LEADVIRT_IMAGE_TAG:-staging}
  build:
    context: ..
    dockerfile: Dockerfile
    args:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:?set NEXT_PUBLIC_WEB_URL}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      NEXT_PUBLIC_TELEGRAM_LOGIN_BOT: ${NEXT_PUBLIC_TELEGRAM_LOGIN_BOT:-}
  restart: unless-stopped

x-leadvirt-runtime: &leadvirt-runtime
  <<: *leadvirt-app
  env_file:
    - ${LEADVIRT_ENV_FILE:-/opt/leadvirt/secrets/.env}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadvirt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: leadvirt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadvirt -d leadvirt"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.5
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  clamav:
    image: clamav/clamav:1.4.2
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav

  migrate:
    <<: *leadvirt-runtime
    restart: "no"
    command:
      [
        "sh",
        "-c",
        "corepack pnpm --filter @leadvirt/db db:migrate && corepack pnpm --filter @leadvirt/api exec tsx ../../artifacts/scripts/knowledge-query-hmac-retained-keys-ready.ts",
      ]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *leadvirt-runtime
    working_dir: /app/apps/api
    command: ["node", "--import", "tsx", "dist/apps/api/src/main.js"]
    stop_grace_period: 30s
    environment:
      API_DEPLOYMENT_PREFLIGHT: "false"
    volumes:
      - knowledge_artifacts:/var/lib/leadvirt/knowledge-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      clamav:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4001/health/ready'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    <<: *leadvirt-runtime
    working_dir: /app/apps/worker
    command: ["node", "--import", "tsx", "dist/apps/worker/src/main.js"]
    stop_grace_period: 2m
    environment:
      WORKER_DEPLOYMENT_PAUSED: ${WORKER_DEPLOYMENT_PAUSED:-false}
    volumes:
      - knowledge_artifacts:/var/lib/leadvirt/knowledge-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4002/health/ready'').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.ready&&x.v.active?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 10s

  web:
    <<: *leadvirt-app
    command: ["corepack", "pnpm", "--filter", "@leadvirt/web", "start"]
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/knowledge-alerts.yml:/etc/prometheus/knowledge-alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_started
      otel-collector:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    restart: unless-stopped
    profiles:
      - observability
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:13133:13133"
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    profiles:
      - observability
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    profiles:
      - observability
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  knowledge_artifacts:
  clamav_data:
  prometheus_data:
  grafana_data:
  tempo_data:
