global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: leadvirt-api-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4001

  - job_name: leadvirt-worker-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4002

  - job_name: leadvirt-otel-collector-local
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8888
