global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/knowledge-alerts.yml

scrape_configs:
  - job_name: leadvirt-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:4001

  - job_name: leadvirt-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:4002

  - job_name: leadvirt-otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:8888
