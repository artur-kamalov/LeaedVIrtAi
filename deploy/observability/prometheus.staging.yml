global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: leadvirt-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:4001

  - job_name: leadvirt-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:4002
