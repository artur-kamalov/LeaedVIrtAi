name: Deploy LeadVirt.ru

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: leadvirt-ru-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  DEPLOY_HOST: ${{ vars.LEADVIRT_DEPLOY_HOST || '193.187.92.88' }}
  DEPLOY_USER: ${{ vars.LEADVIRT_DEPLOY_USER || 'deploy' }}
  DEPLOY_ROOT: /opt/leadvirt
  DEPLOY_ENV_FILE: /opt/leadvirt/secrets/.env
  PUBLIC_URL: https://leadvirt.ru
  NEXT_PUBLIC_API_URL: https://leadvirt.ru/api
  NEXT_PUBLIC_APP_URL: https://leadvirt.ru
  NEXT_PUBLIC_WEB_URL: https://leadvirt.ru
  NEXT_PUBLIC_DEMO_MODE: "false"
  NEXT_PUBLIC_TELEGRAM_LOGIN_BOT: LeadVirtAi_bot

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leadvirt_ci?schema=public
      REDIS_URL: redis://localhost:6380
      PORT: "4001"
      APP_URL: http://localhost:3001
      API_URL: http://localhost:4001
      CORS_ORIGINS: http://localhost:3001
      TELEGRAM_LOGIN_BOT_TOKEN: 123456:leadvirt-test-token
      AI_PROVIDER: mock
      AI_ENABLE_REAL_PROVIDER: "false"
      AI_REPLY_MODE: queue
      RAG_QDRANT_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: corepack pnpm --filter @leadvirt/db db:generate

      - name: Prepare quality gate database
        run: corepack pnpm --filter @leadvirt/db db:migrate

      - name: Typecheck shared types
        run: corepack pnpm --filter @leadvirt/types typecheck

      - name: Verify API
        run: |
          corepack pnpm --filter @leadvirt/api typecheck
          corepack pnpm --filter @leadvirt/api lint
          corepack pnpm --filter @leadvirt/api build

      - name: Verify Web
        run: |
          corepack pnpm --filter @leadvirt/web typecheck
          corepack pnpm --filter @leadvirt/web lint
          corepack pnpm --filter @leadvirt/web build

      - name: Verify Worker
        run: |
          corepack pnpm --filter @leadvirt/worker typecheck
          corepack pnpm --filter @leadvirt/worker lint
          corepack pnpm --filter @leadvirt/worker build

      - name: Verify release readiness scripts
        run: corepack pnpm run qa:release-readiness

      - name: Verify AI quality gate
        run: corepack pnpm run qa:ai:quality

      - name: Verify AI clean Telegram acceptance
        env:
          LEADVIRT_API_BASE: http://localhost:4001/api
          WORKER_ENABLE_PROCESSORS: "true"
          WORKER_METRICS_PORT: "4002"
          WORKER_METRICS_URL: http://localhost:4002/metrics
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs
          cleanup() {
            if [ -f artifacts/logs/ci-api.pid ]; then kill "$(cat artifacts/logs/ci-api.pid)" 2>/dev/null || true; fi
            if [ -f artifacts/logs/ci-worker.pid ]; then kill "$(cat artifacts/logs/ci-worker.pid)" 2>/dev/null || true; fi
          }
          trap cleanup EXIT
          corepack pnpm --filter @leadvirt/api dev > artifacts/logs/ci-api.log 2> artifacts/logs/ci-api.err.log &
          echo "$!" > artifacts/logs/ci-api.pid
          WORKER_ENABLE_PROCESSORS=true WORKER_METRICS_PORT=4002 corepack pnpm --filter @leadvirt/worker dev > artifacts/logs/ci-worker.log 2> artifacts/logs/ci-worker.err.log &
          echo "$!" > artifacts/logs/ci-worker.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:4001/health >/dev/null 2>&1 && curl -fsS http://localhost:4002/metrics >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              echo "API/worker did not become ready" >&2
              tail -n 120 artifacts/logs/ci-api.log artifacts/logs/ci-api.err.log artifacts/logs/ci-worker.log artifacts/logs/ci-worker.err.log || true
              exit 1
            fi
            sleep 2
          done
          corepack pnpm run qa:ai:acceptance

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-eval-report
          path: artifacts/reports/*.json
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    needs: verify
    environment: leadvirt-ru

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create deploy package
        run: |
          set -euo pipefail
          mkdir -p artifacts/scripts artifacts/playwright artifacts/evals
          package_path="$RUNNER_TEMP/leadvirt-release-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='**/.env.*.local' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='**/.next' \
            --exclude='**/dist' \
            --exclude='**/*.tsbuildinfo' \
            --exclude='.turbo' \
            --exclude='.logs' \
            --exclude='test-results' \
            --exclude='artifacts/logs' \
            --exclude='artifacts/reports' \
            --exclude='artifacts/playwright/*.png' \
            --exclude='artifacts/screenshots' \
            -czf "$package_path" \
            apps \
            deploy \
            docs \
            packages \
            artifacts/evals \
            artifacts/scripts \
            artifacts/playwright \
            .dockerignore \
            .env.example \
            .gitignore \
            .prettierignore \
            .prettierrc \
            agents.md \
            docker-compose.yml \
            Dockerfile \
            eslint.config.mjs \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            README.md \
            tsconfig.base.json \
            turbo.json
          tar -tzf "$package_path" >/dev/null
          echo "PACKAGE_PATH=$package_path" >> "$GITHUB_ENV"

      - name: Install SSH key
        env:
          LEADVIRT_DEPLOY_SSH_KEY: ${{ secrets.LEADVIRT_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LEADVIRT_DEPLOY_SSH_KEY}" ]; then
            echo "::error::Missing LEADVIRT_DEPLOY_SSH_KEY secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LEADVIRT_DEPLOY_SSH_KEY" > ~/.ssh/leadvirt_deploy_key
          chmod 600 ~/.ssh/leadvirt_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          scp -i ~/.ssh/leadvirt_deploy_key \
            "$PACKAGE_PATH" \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/leadvirt-release-${GITHUB_SHA}.tar.gz"

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/leadvirt_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' DEPLOY_ENV_FILE='$DEPLOY_ENV_FILE' PUBLIC_URL='$PUBLIC_URL' RELEASE_SHA='$GITHUB_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          release_id="${RELEASE_SHA:0:12}"
          archive="/tmp/leadvirt-release-${RELEASE_SHA}.tar.gz"
          release_dir="$DEPLOY_ROOT/releases/$release_id"
          current_link="$DEPLOY_ROOT/current"

          mkdir -p "$DEPLOY_ROOT/releases"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          tar -xzf "$archive" -C "$release_dir"
          mkdir -p "$release_dir/artifacts" "$release_dir/deploy/certbot/www"
          cp "$release_dir/deploy/nginx.https.conf" "$release_dir/deploy/nginx.conf"
          if [ -L "$current_link" ]; then
            ln -sfn "$release_dir" "$current_link"
          elif [ -e "$current_link" ]; then
            backup_dir="$DEPLOY_ROOT/current.backup.$(date +%Y%m%d%H%M%S)"
            mv "$current_link" "$backup_dir"
            ln -s "$release_dir" "$current_link"
          else
            ln -s "$release_dir" "$current_link"
          fi

          cd "$current_link"
          docker compose --env-file "$DEPLOY_ENV_FILE" -f deploy/docker-compose.staging.yml up -d --build --force-recreate --remove-orphans migrate api worker web nginx
          docker compose --env-file "$DEPLOY_ENV_FILE" -f deploy/docker-compose.staging.yml ps

          curl -fsS "$PUBLIC_URL/health" >/dev/null
          auth_status="$(curl -sS -o /dev/null -w '%{http_code}' "$PUBLIC_URL/api/auth/me")"
          if [ "$auth_status" != "401" ]; then
            echo "Expected /api/auth/me without cookie to return 401, got $auth_status" >&2
            exit 1
          fi

          find "$DEPLOY_ROOT/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | tail -n +6 \
            | cut -d' ' -f2- \
            | xargs -r rm -rf
          rm -f "$archive"
          REMOTE
