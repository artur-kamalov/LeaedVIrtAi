name: Deploy LeadVirt.com

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: leadvirt-com-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  DEPLOY_HOST: ${{ vars.LEADVIRT_DEPLOY_HOST || '193.187.92.88' }}
  DEPLOY_TARGET_IP: ${{ vars.LEADVIRT_DEPLOY_TARGET_IP || '193.187.92.88' }}
  DEPLOY_USER: ${{ vars.LEADVIRT_DEPLOY_USER || 'deploy' }}
  DEPLOY_ROOT: /opt/leadvirt
  DEPLOY_ENV_FILE: /opt/leadvirt/secrets/.env
  PRIMARY_DOMAIN: leadvirt.com
  WWW_DOMAIN: www.leadvirt.com
  PUBLIC_URL: https://leadvirt.com
  NEXT_PUBLIC_API_URL: https://leadvirt.com/api
  NEXT_PUBLIC_APP_URL: https://leadvirt.com
  NEXT_PUBLIC_WEB_URL: https://leadvirt.com
  NEXT_PUBLIC_DEMO_MODE: "false"
  EXPECTED_TELEGRAM_BOT_API_BASE_URL: https://147-90-14-240.sslip.io:8443/telegram
  EXPECTED_TELEGRAM_WEBHOOK_BASE_URL: https://147-90-14-240.sslip.io:8443/telegram-webhook

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      qdrant:
        image: qdrant/qdrant:v1.15.5
        ports:
          - 6333:6333
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/leadvirt_ci?schema=public
      REDIS_URL: redis://localhost:6380
      PORT: "4001"
      APP_URL: http://localhost:3001
      API_URL: http://localhost:4001
      CORS_ORIGINS: http://localhost:3001
      AUTH_TELEGRAM_ENABLED: "false"
      AI_PROVIDER: mock
      AI_ENABLE_REAL_PROVIDER: "false"
      AI_REPLY_MODE: queue
      RAG_QDRANT_ENABLED: "false"
      RAG_RETRIEVAL_MODE: "database"
      RAG_QDRANT_URL: http://localhost:6333
      BUSINESS_IMPORT_ENABLED: "true"
      NEXT_PUBLIC_BUSINESS_IMPORT_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          corepack enable
          corepack pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: corepack pnpm --filter @leadvirt/db db:generate

      - name: Prepare quality gate database
        run: corepack pnpm --filter @leadvirt/db db:migrate

      - name: Verify tenant transaction context
        run: |
          corepack pnpm --filter @leadvirt/db typecheck
          corepack pnpm --filter @leadvirt/db lint
          corepack pnpm --filter @leadvirt/db build
          corepack pnpm run qa:db:tenant-context

      - name: Typecheck shared types
        run: corepack pnpm --filter @leadvirt/types typecheck

      - name: Verify integrations package
        run: |
          corepack pnpm --filter @leadvirt/integrations typecheck
          corepack pnpm --filter @leadvirt/integrations lint
          corepack pnpm --filter @leadvirt/integrations build
          corepack pnpm --filter @leadvirt/integrations runtime-check

      - name: Verify knowledge and runtime queue packages
        run: |
          corepack pnpm --filter @leadvirt/knowledge typecheck
          corepack pnpm --filter @leadvirt/knowledge lint
          corepack pnpm --filter @leadvirt/knowledge build
          corepack pnpm --filter @leadvirt/runtime-queue typecheck
          corepack pnpm --filter @leadvirt/runtime-queue lint
          corepack pnpm --filter @leadvirt/runtime-queue build

      - name: Verify API
        run: |
          corepack pnpm --filter @leadvirt/api typecheck
          corepack pnpm --filter @leadvirt/api lint
          corepack pnpm --filter @leadvirt/api build

      - name: Verify Web
        run: |
          corepack pnpm --filter @leadvirt/web typecheck
          corepack pnpm --filter @leadvirt/web lint
          corepack pnpm --filter @leadvirt/web build

      - name: Verify Worker
        run: |
          corepack pnpm --filter @leadvirt/worker typecheck
          corepack pnpm --filter @leadvirt/worker lint
          corepack pnpm --filter @leadvirt/worker build

      - name: Verify business information imports
        run: |
          corepack pnpm --filter @leadvirt/business-import typecheck
          corepack pnpm --filter @leadvirt/business-import lint
          corepack pnpm --filter @leadvirt/business-import build
          corepack pnpm --filter @leadvirt/business-import qa:admission
          corepack pnpm --filter @leadvirt/business-import qa:csv
          corepack pnpm --filter @leadvirt/business-import qa:xlsx
          corepack pnpm --filter @leadvirt/db qa:business-import-migration
          corepack pnpm --filter @leadvirt/api qa:business-import:application
          corepack pnpm --filter @leadvirt/api qa:business-import:lifecycle
          corepack pnpm --filter @leadvirt/api qa:business-import:review
          corepack pnpm --filter @leadvirt/api qa:business-import:rebase
          corepack pnpm --filter @leadvirt/api qa:business-profile:canonical
          corepack pnpm --filter @leadvirt/worker qa:business-import
          corepack pnpm --filter @leadvirt/worker qa:business-import:capacity
          corepack pnpm --filter @leadvirt/worker qa:business-information-projection
          corepack pnpm --filter @leadvirt/worker qa:business-import:sweeper
          corepack pnpm --filter @leadvirt/api qa:business-import:e2e

      - name: Verify business import parser image
        env:
          BUSINESS_IMPORT_ENABLED: "true"
          BUSINESS_IMPORT_PARSER_APPROVED: "true"
        run: |
          if [ "$BUSINESS_IMPORT_ENABLED" != "true" ] || [ "$BUSINESS_IMPORT_PARSER_APPROVED" != "true" ]; then
            echo "Business import parser image verification skipped: parser deployment gate is closed."
            exit 0
          fi
          parser_container="leadvirt-business-import-parser-ci"
          trap 'docker rm -f "$parser_container" >/dev/null 2>&1 || true' EXIT
          docker build --tag leadvirt-business-import-parser:ci deploy/business-import-parser
          docker run -d \
            --name "$parser_container" \
            --read-only \
            --tmpfs /tmp:size=384m,mode=1777,noexec,nosuid,nodev \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --pids-limit 64 \
            --memory 768m \
            --cpus 1 \
            leadvirt-business-import-parser:ci >/dev/null
          for attempt in $(seq 1 30); do
            if docker exec "$parser_container" python -c "import json,urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=2)); raise SystemExit(0 if payload.get('ready') is True and payload.get('version') == 'poppler-tesseract-v1' and payload.get('contractVersion') == 'leadvirt.pdf-extraction.v1' else 1)"; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "Business import parser image did not become ready with the expected contract." >&2
              exit 1
            fi
            sleep 2
          done
          docker exec -i "$parser_container" python - < deploy/business-import-parser/runtime_smoke.py
          parser_logs="$(docker logs "$parser_container" 2>&1)"
          if printf '%s' "$parser_logs" | grep -Fq -e 'PRIVATE_SERVICE_SENTINEL_7843' -e 'SERVICE PRICE 25 EUR'; then
            echo "Business import parser leaked extracted content to container logs." >&2
            exit 1
          fi

      - name: Verify release readiness scripts
        run: |
          bash -n artifacts/scripts/deployment-journal.sh
          corepack pnpm run qa:release-readiness
          corepack pnpm run qa:runtime:readiness

      - name: Verify UniSender email OTP contract
        run: corepack pnpm run qa:auth:unisender-contract

      - name: Verify SMTP email OTP contract
        run: corepack pnpm run qa:auth:smtp-contract

      - name: Verify managed Telegram connection
        run: |
          corepack pnpm run qa:telegram:contract
          corepack pnpm run qa:telegram:managed

      - name: Verify domain migration
        run: corepack pnpm run qa:domain-migration

      - name: Verify AI quality gate
        run: corepack pnpm run qa:ai:quality

      - name: Verify Phase 0 knowledge and reply reliability
        run: |
          corepack pnpm run qa:knowledge:publication
          corepack pnpm run qa:knowledge:qdrant-failure
          corepack pnpm run qa:knowledge:qdrant-reconciliation
          corepack pnpm run qa:knowledge:v2:http
          corepack pnpm run qa:knowledge:v2:idempotency
          corepack pnpm run qa:knowledge:v2:sources
          corepack pnpm run qa:knowledge:v2:feedback
          corepack pnpm run qa:knowledge:v2:review
          corepack pnpm run qa:knowledge:v2:review-decisions
          corepack pnpm run qa:knowledge:v2:conflict-hydration
          corepack pnpm run qa:knowledge:v2:bulk-review
          corepack pnpm run qa:knowledge:v2:test-cases
          corepack pnpm run qa:knowledge:v2:validation-pipe
          corepack pnpm run qa:knowledge:v2:processor-query-admission
          corepack pnpm run qa:knowledge:v2:query-key-registry
          corepack pnpm run qa:knowledge:v2:operational-query
          corepack pnpm run qa:knowledge:v2:operational-runtime
          corepack pnpm run qa:knowledge:v2:diagnostic-search
          corepack pnpm run qa:knowledge:v2:live-tool-ledger
          corepack pnpm run qa:knowledge:v2:grounded-gate
          corepack pnpm run qa:knowledge:v2:evaluation-publication
          corepack pnpm run qa:knowledge:v2:real-provider-contract
          corepack pnpm run qa:knowledge:v2:content-reconciliation
          corepack pnpm run qa:knowledge:file-admission
          corepack pnpm run qa:knowledge:v2:file-ingestion
          corepack pnpm run qa:onboarding:atomic
          corepack pnpm run qa:onboarding:http
          corepack pnpm run qa:onboarding:user-smoke
          corepack pnpm run qa:operator:operations
          corepack pnpm run qa:knowledge:v2:hybrid-qdrant
          corepack pnpm run qa:knowledge:v2:hybrid-qdrant-real
          corepack pnpm run qa:knowledge:v2:review-schema
          corepack pnpm run qa:knowledge:v2:legacy-migration
          corepack pnpm run qa:knowledge:v2:observability
          corepack pnpm run qa:knowledge:v2:publication-telemetry
          corepack pnpm run qa:knowledge:website-security
          corepack pnpm run qa:knowledge:website-connector
          corepack pnpm run qa:knowledge:website-parser
          corepack pnpm run qa:knowledge:website-content-security
          corepack pnpm run qa:knowledge:object-store
          corepack pnpm run qa:knowledge:v2:ingestion
          corepack pnpm run qa:runtime:outbox
          corepack pnpm run qa:runtime:inbox
          corepack pnpm run qa:runtime:manual-delivery
          corepack pnpm run qa:runtime:relationships
          corepack pnpm run qa:channels:delivery
          corepack pnpm run qa:channels:structured-delivery
          corepack pnpm run qa:webhook:reliability
          corepack pnpm run qa:worker:dlq
          corepack pnpm run qa:rbac:knowledge

      - name: Verify AI and Knowledge acceptance
        env:
          APP_ENV: acceptance
          LEADVIRT_API_BASE: http://localhost:4001/api
          LEADVIRT_WEB_BASE: http://localhost:3001
          NEXT_PUBLIC_API_URL: http://localhost:4001/api
          WORKER_ENABLE_PROCESSORS: "true"
          WORKER_METRICS_PORT: "4002"
          WORKER_METRICS_URL: http://localhost:4002/metrics
          RAG_QDRANT_ENABLED: "true"
          RAG_RETRIEVAL_MODE: qdrant
          RAG_QDRANT_URL: http://localhost:6333
          RAG_QDRANT_COLLECTION: leadvirt_knowledge_acceptance
          RAG_QDRANT_TIMEOUT_MS: "5000"
          RAG_MIN_SCORE: "0.01"
          RAG_CANDIDATE_LIMIT: "50"
          AI_API_KEY: acceptance-only
          AI_BASE_URL: http://127.0.0.1:4011/v1
          KNOWLEDGE_EMBEDDING_PROVIDER_APPROVED: "true"
          KNOWLEDGE_V2_EMBEDDING_MODEL: acceptance-embedding-v1
          KNOWLEDGE_V2_EMBEDDING_DIMENSIONS: "16"
          KNOWLEDGE_V2_EMBEDDING_BATCH_SIZE: "16"
          KNOWLEDGE_V2_EMBEDDING_DEPLOYMENT: acceptance-embedding
          KNOWLEDGE_V2_EMBEDDING_REGION: local-acceptance
          KNOWLEDGE_V2_EMBEDDING_POLICY_VERSION: external-embedding-v1
          KNOWLEDGE_V2_EXTERNAL_EMBEDDING_MAX_CLASSIFICATION: INTERNAL
          KNOWLEDGE_V2_RETRIEVAL_POLICY_VERSION: external-retrieval-v1
          KNOWLEDGE_V2_QUERY_EMBEDDING_MAX_CLASSIFICATION: SECRET
          KNOWLEDGE_V2_RERANKER_MAX_CLASSIFICATION: SENSITIVE
          KNOWLEDGE_V2_SPARSE_MAX_NON_ZERO: "256"
          KNOWLEDGE_V2_RERANKER_APPROVED: "true"
          KNOWLEDGE_V2_RERANKER_ENDPOINT: http://127.0.0.1:4011/rerank
          KNOWLEDGE_V2_RERANKER_PROVIDER: acceptance-reranker
          KNOWLEDGE_V2_RERANKER_MODEL: acceptance-reranker-v1
          KNOWLEDGE_V2_RERANKER_VERSION: v1
          KNOWLEDGE_V2_RERANKER_REGION: local-acceptance
          KNOWLEDGE_V2_GROUNDED_ANSWER_APPROVED: "true"
          KNOWLEDGE_V2_GROUNDED_ANSWER_BASE_URL: http://127.0.0.1:4011/v1
          KNOWLEDGE_V2_GROUNDED_ANSWER_API_KEY: acceptance-only
          KNOWLEDGE_V2_GROUNDED_ANSWER_PROVIDER: acceptance-grounded
          KNOWLEDGE_V2_GROUNDED_ANSWER_MODEL: acceptance-grounded-v1
          KNOWLEDGE_V2_GROUNDED_ANSWER_VERSION: v1
          KNOWLEDGE_V2_GROUNDED_ANSWER_REGION: local-acceptance
          KNOWLEDGE_V2_MODEL_PROCESSOR_POLICY_VERSION: external-model-v1
          KNOWLEDGE_V2_GROUNDED_PROMPT_POLICY_VERSION: grounded-answer-v1
          KNOWLEDGE_V2_MODEL_PROCESSOR_MAX_CLASSIFICATION: INTERNAL
          KNOWLEDGE_WEBSITE_IMPORT_ENABLED: "true"
          KNOWLEDGE_WEBSITE_EGRESS_READY: "true"
          KNOWLEDGE_ACCEPTANCE_WEBSITE_FIXTURE_ENABLED: "true"
          KNOWLEDGE_OBJECT_STORE_PATH: /tmp/leadvirt-knowledge-acceptance
          KNOWLEDGE_ARTIFACT_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
          KNOWLEDGE_ARTIFACT_ENCRYPTION_KEY_ID: acceptance-artifact-v1
          KNOWLEDGE_QUERY_HMAC_ACTIVE_KEY_ID: acceptance-query-v1
          KNOWLEDGE_QUERY_HMAC_KEYS: '{"acceptance-query-v1":"CQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQk="}'
          KNOWLEDGE_ACCEPTANCE_PROVIDER_URL: http://127.0.0.1:4011
        run: |
          set -euo pipefail
          mkdir -p artifacts/logs
          cleanup() {
            if [ -f artifacts/logs/ci-api.pid ]; then kill "$(cat artifacts/logs/ci-api.pid)" 2>/dev/null || true; fi
            if [ -f artifacts/logs/ci-worker.pid ]; then kill "$(cat artifacts/logs/ci-worker.pid)" 2>/dev/null || true; fi
            if [ -f artifacts/logs/ci-web.pid ]; then kill "$(cat artifacts/logs/ci-web.pid)" 2>/dev/null || true; fi
            if [ -f artifacts/logs/ci-knowledge-provider.pid ]; then kill "$(cat artifacts/logs/ci-knowledge-provider.pid)" 2>/dev/null || true; fi
            rm -rf /tmp/leadvirt-knowledge-acceptance
          }
          trap cleanup EXIT
          node artifacts/scripts/knowledge-fresh-owner-provider-fixture.mjs > artifacts/logs/ci-knowledge-provider.log 2> artifacts/logs/ci-knowledge-provider.err.log &
          echo "$!" > artifacts/logs/ci-knowledge-provider.pid
          corepack pnpm --filter @leadvirt/api dev > artifacts/logs/ci-api.log 2> artifacts/logs/ci-api.err.log &
          echo "$!" > artifacts/logs/ci-api.pid
          WORKER_ENABLE_PROCESSORS=true WORKER_METRICS_PORT=4002 corepack pnpm --filter @leadvirt/worker dev > artifacts/logs/ci-worker.log 2> artifacts/logs/ci-worker.err.log &
          echo "$!" > artifacts/logs/ci-worker.pid
          NEXT_PUBLIC_API_URL=http://localhost:4001/api corepack pnpm --filter @leadvirt/web dev > artifacts/logs/ci-web.log 2> artifacts/logs/ci-web.err.log &
          echo "$!" > artifacts/logs/ci-web.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4011/health >/dev/null 2>&1 && curl -fsS http://localhost:6333/healthz >/dev/null 2>&1 && curl -fsS http://localhost:4001/health/ready >/dev/null 2>&1 && curl -fsS http://localhost:4002/health/ready >/dev/null 2>&1 && curl -fsS http://localhost:4002/metrics >/dev/null 2>&1 && curl -fsS http://localhost:3001/app/knowledge >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              echo "API/worker/web did not become ready" >&2
              tail -n 120 artifacts/logs/ci-knowledge-provider.log artifacts/logs/ci-knowledge-provider.err.log artifacts/logs/ci-api.log artifacts/logs/ci-api.err.log artifacts/logs/ci-worker.log artifacts/logs/ci-worker.err.log artifacts/logs/ci-web.log artifacts/logs/ci-web.err.log || true
              exit 1
            fi
            sleep 2
          done
          corepack pnpm run qa:auth:email-otp
          corepack pnpm exec playwright test artifacts/playwright/onboarding-knowledge-sources.spec.ts --reporter=line --workers=1
          corepack pnpm exec playwright test artifacts/playwright/inbox-live-refresh.spec.ts --reporter=line --workers=1
          corepack pnpm exec playwright test artifacts/playwright/demo-conversation-mobile-scroll.spec.ts artifacts/playwright/pipeline-list-responsive.spec.ts --reporter=line --workers=1
          corepack pnpm exec playwright test artifacts/playwright/client-eye-ux-regressions.spec.ts --reporter=line --workers=1
          corepack pnpm exec playwright test artifacts/playwright/business-import.spec.ts --reporter=line --workers=1
          corepack pnpm exec playwright test artifacts/playwright/business-import-approval-discovery.spec.ts --reporter=line --workers=1
          corepack pnpm run qa:knowledge:v2:api
          corepack pnpm run qa:knowledge:v2:workspace
          corepack pnpm run qa:knowledge:v2:editors
          corepack pnpm run qa:knowledge:v2:sources-ui
          corepack pnpm run qa:knowledge:v2:review-ui
          corepack pnpm run qa:knowledge:v2:bulk-review-ui
          corepack pnpm run qa:knowledge:v2:test-ui
          corepack pnpm run qa:knowledge:v2:fresh-owner
          corepack pnpm run qa:browser-security
          corepack pnpm run qa:ai:acceptance

      - name: Upload AI eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-eval-report
          path: artifacts/reports/*.json
          if-no-files-found: ignore
          retention-days: 14

  deploy:
    name: Deploy
    runs-on: ubuntu-24.04
    needs: verify
    environment: leadvirt-com

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create deploy package
        run: |
          set -euo pipefail
          mkdir -p artifacts/scripts artifacts/playwright artifacts/evals
          package_path="$RUNNER_TEMP/leadvirt-release-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='**/.env' \
            --exclude='**/.env.local' \
            --exclude='**/.env.*.local' \
            --exclude='node_modules' \
            --exclude='**/node_modules' \
            --exclude='**/.next' \
            --exclude='**/dist' \
            --exclude='**/*.tsbuildinfo' \
            --exclude='.turbo' \
            --exclude='.logs' \
            --exclude='test-results' \
            --exclude='artifacts/logs' \
            --exclude='artifacts/reports' \
            --exclude='artifacts/playwright/*.png' \
            --exclude='artifacts/screenshots' \
            -czf "$package_path" \
            apps \
            deploy \
            docs \
            packages \
            artifacts/evals \
            artifacts/scripts \
            artifacts/playwright \
            .dockerignore \
            .env.example \
            .gitignore \
            .prettierignore \
            .prettierrc \
            agents.md \
            docker-compose.yml \
            Dockerfile \
            eslint.config.mjs \
            package.json \
            pnpm-lock.yaml \
            pnpm-workspace.yaml \
            README.md \
            tsconfig.base.json \
            turbo.json
          tar -tzf "$package_path" >/dev/null
          echo "PACKAGE_PATH=$package_path" >> "$GITHUB_ENV"

      - name: Install SSH key
        env:
          LEADVIRT_DEPLOY_SSH_KEY: ${{ secrets.LEADVIRT_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${LEADVIRT_DEPLOY_SSH_KEY}" ]; then
            echo "::error::Missing LEADVIRT_DEPLOY_SSH_KEY secret"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LEADVIRT_DEPLOY_SSH_KEY" > ~/.ssh/leadvirt_deploy_key
          chmod 600 ~/.ssh/leadvirt_deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          scp -i ~/.ssh/leadvirt_deploy_key \
            "$PACKAGE_PATH" \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/leadvirt-release-${GITHUB_SHA}.tar.gz"

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          remote_deploy_log="$(mktemp)"
          remote_completion_token="$(openssl rand -hex 32)"
          trap 'rm -f "$remote_deploy_log"' EXIT
          ssh -i ~/.ssh/leadvirt_deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_ROOT='$DEPLOY_ROOT' DEPLOY_ENV_FILE='$DEPLOY_ENV_FILE' DOMAIN_TARGET_IP='$DEPLOY_TARGET_IP' PRIMARY_DOMAIN='$PRIMARY_DOMAIN' WWW_DOMAIN='$WWW_DOMAIN' PUBLIC_URL='$PUBLIC_URL' RELEASE_SHA='$GITHUB_SHA' EXPECTED_TELEGRAM_BOT_API_BASE_URL='$EXPECTED_TELEGRAM_BOT_API_BASE_URL' EXPECTED_TELEGRAM_WEBHOOK_BASE_URL='$EXPECTED_TELEGRAM_WEBHOOK_BASE_URL' bash -c 'remote_program=\$(cat); bash -c \"\$remote_program\" -- \"\$1\"' -- '$remote_completion_token'" <<'REMOTE' | tee "$remote_deploy_log"
          set -euo pipefail
          unset DEPLOY_COMPLETION_TOKEN
          DEPLOY_COMPLETION_TOKEN="$1"
          shift

          release_sha_id="${RELEASE_SHA:0:12}"
          archive="/tmp/leadvirt-release-${RELEASE_SHA}.tar.gz"
          current_link="$DEPLOY_ROOT/current"

          mkdir -p "$DEPLOY_ROOT/releases"
          exec 9>"$DEPLOY_ROOT/.deploy.lock"
          if ! flock -n 9; then
            echo "Another deployment is already running." >&2
            exit 1
          fi
          installed_deployment_journal="$DEPLOY_ROOT/.deployment-journal.sh"
          deployment_journal_file="$DEPLOY_ROOT/.deployment-journal.v1"
          if [ -f "$installed_deployment_journal" ] && [ ! -L "$installed_deployment_journal" ]; then
            LEADVIRT_DEPLOY_LOCK_HELD=1 DEPLOY_ROOT="$DEPLOY_ROOT" \
              bash "$installed_deployment_journal" reconcile </dev/null
          elif [ -e "$deployment_journal_file" ] || [ -L "$deployment_journal_file" ]; then
            echo "A deployment journal exists but its reconciler is unavailable." >&2
            exit 1
          fi
          release_dir="$(mktemp -d "$DEPLOY_ROOT/releases/${release_sha_id}-attempt-XXXXXX")"
          chmod 755 "$release_dir"
          release_id="$(basename "$release_dir")"
          tar -xzf "$archive" -C "$release_dir"
