            --name "$candidate_web_container" \
            web >/dev/null

          for candidate_container in "$candidate_api_container" "$candidate_worker_container"; do
            if ! docker exec "$candidate_container" \
              node /app/artifacts/scripts/business-import-production-ready.mjs; then
              echo "Candidate $candidate_container does not have the exact CSV-only Business Import rollout." >&2
              exit 1
            fi
          done
          if ! docker exec "$candidate_web_container" \
            node -e "process.exit(process.env.NEXT_PUBLIC_BUSINESS_IMPORT_ENABLED==='true'?0:1)"; then
            echo "Candidate web does not have Business Import enabled at build time." >&2
            exit 1
          fi
          echo "DEPLOY_GATE: business-import-csv-rollout-enabled"

          if [ "$business_import_parser_enabled" = "1" ]; then
            for attempt in $(seq 1 30); do
              if docker exec "$candidate_parser_container" python -c "import json,urllib.request; payload=json.load(urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=2)); raise SystemExit(0 if payload.get('ready') is True and payload.get('version') == 'poppler-tesseract-v1' and payload.get('contractVersion') == 'leadvirt.pdf-extraction.v1' else 1)"; then
                break
              fi
              if [ "$attempt" = "30" ]; then
                echo "Candidate business import parser did not become ready with the expected contract." >&2
                exit 1
              fi
              sleep 2
            done
          fi
          for attempt in $(seq 1 30); do
            if docker exec "$candidate_api_container" \
              node -e "fetch('http://127.0.0.1:4001/health/ready').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.data?.deploymentPreflight===true?0:1)).catch(()=>process.exit(1))"; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "Candidate API preflight did not become healthy." >&2
              exit 1
            fi
            sleep 2
          done
          if ! docker exec "$candidate_api_container" \
            node -e "fetch('http://127.0.0.1:4001/api/auth/email-otp/config').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.data?.enabled===true?0:1)).catch(()=>process.exit(1))"; then
            echo "Candidate API email OTP authentication is not enabled and ready." >&2
            exit 1
          fi
          if ! docker exec "$candidate_api_container" \
            node -e "fetch('http://127.0.0.1:4001/api/auth/telegram/config').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.data?.enabled===false&&x.v.data?.botId===null&&x.v.data?.botUsername===null?0:1)).catch(()=>process.exit(1))"; then
            echo "Candidate API Telegram account authentication is not explicitly disabled." >&2
            exit 1
          fi
          echo "DEPLOY_GATE: candidate-email-otp-enabled-and-telegram-auth-disabled"
          for attempt in $(seq 1 30); do
            if docker exec "$candidate_worker_container" \
              node -e "fetch('http://127.0.0.1:4002/health/ready').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.ready&&!x.v.active&&x.v.deploymentPaused?0:1)).catch(()=>process.exit(1))"; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "Paused candidate worker preflight did not become ready." >&2
              exit 1
            fi
              sleep 2
            done
          if [ "$business_import_parser_enabled" = "1" ]; then
            if ! docker exec "$candidate_worker_container" \
              node -e "fetch(process.env.BUSINESS_IMPORT_PARSER_URL+'/health').then(async r=>({ok:r.ok,v:await r.json()})).then(x=>process.exit(x.ok&&x.v.ready===true&&x.v.version==='poppler-tesseract-v1'&&x.v.contractVersion==='leadvirt.pdf-extraction.v1'?0:1)).catch(()=>process.exit(1))"; then
              echo "Candidate worker cannot reach the candidate business import parser contract." >&2
              exit 1
            fi
          fi
          for attempt in $(seq 1 30); do
            if docker exec "$candidate_web_container" \
              node -e "fetch('http://127.0.0.1:3001').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "Candidate web preflight did not become ready." >&2
              exit 1
            fi
              sleep 2
            done
          release_compose run --rm --no-deps -T nginx nginx -t
          remove_candidate_preflights
          assert_previous_containers_unchanged
          echo "DEPLOY_GATE: isolated-candidate-api-worker-and-web-ready parser-enabled=$business_import_parser_enabled"

          if [ "${#previous_writer_container_ids[@]}" -gt 0 ]; then
            docker stop --time 120 "${previous_writer_container_ids[@]}"
          fi
          echo "DEPLOY_GATE: exact-prior-writers-drained"

          if [ "${#previous_nginx_container_ids[@]}" -gt 0 ]; then
            docker stop --time 30 "${previous_nginx_container_ids[@]}"
          fi
          echo "DEPLOY_GATE: public-nginx-stopped"

          case "$previous_current_kind" in
            symlink)
              if [ ! -L "$current_link" ] || [ "$(readlink "$current_link")" != "$previous_link_target" ]; then
                echo "Current link changed while the release gate was running." >&2
                exit 1
              fi
              atomic_replace_current_symlink "$release_dir"
              ;;
            path)
              assert_previous_current_unchanged
              mv -- "$current_link" "$previous_backup_dir"
              sync -f "$DEPLOY_ROOT"
              if [ "$(stat -Lc '%d:%i' "$previous_backup_dir" 2>/dev/null || true)" != "$previous_path_identity" ]; then
                echo "Current path identity changed while it was being switched." >&2
                exit 1
              fi
              atomic_replace_current_symlink "$release_dir"
              ;;
            missing)
              if [ -e "$current_link" ] || [ -L "$current_link" ]; then
                echo "Current path appeared while the release gate was running." >&2
                exit 1
              fi
              atomic_replace_current_symlink "$release_dir"
              ;;
          esac

          persist_deployment_journal committed
          deployment_phase="rollforward"
          echo "DEPLOY_COMMIT: old-code-rollback-disarmed"
          rollforward_candidate primary

          release_compose ps
          echo "DEPLOY_COMPLETE: health-worker-and-key-coverage-succeeded"
          deployment_phase="complete"
          trap - EXIT HUP INT TERM

          if ! LEADVIRT_DEPLOY_LOCK_HELD=1 DEPLOY_ROOT="$DEPLOY_ROOT" \
            bash "$installed_deployment_journal" prune 5 </dev/null; then
            echo "DEPLOY_PRUNE: deferred because references could not be proven." >&2
          fi
          rm -f "$archive"
          printf 'DEPLOY_REMOTE_COMPLETE:%s:%s\n' "$RELEASE_SHA" "$DEPLOY_COMPLETION_TOKEN"
          REMOTE

          if ! grep -Fx "DEPLOY_REMOTE_COMPLETE:$GITHUB_SHA:$remote_completion_token" "$remote_deploy_log" >/dev/null; then
            echo "::error::Remote deployment ended without the completion marker"
            exit 1
          fi
