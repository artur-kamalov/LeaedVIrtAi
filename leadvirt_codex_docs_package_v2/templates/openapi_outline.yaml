openapi: 3.0.3
info:
  title: LeadVirt.ai API
  version: 0.1.0
servers:
  - url: http://localhost:4000/api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /dashboard/summary:
    get:
      summary: Get dashboard summary
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Dashboard summary
  /inbox/conversations:
    get:
      summary: List conversations
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          schema:
            type: string
          required: true
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          description: Conversation list
  /inbox/conversations/{conversationId}:
    get:
      summary: Get conversation
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          schema:
            type: string
          required: true
        - in: path
          name: conversationId
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Conversation detail
  /inbox/conversations/{conversationId}/messages:
    get:
      summary: List conversation messages
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          schema:
            type: string
          required: true
        - in: path
          name: conversationId
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Messages
    post:
      summary: Send manual message
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-Tenant-Id
          schema:
            type: string
          required: true
        - in: path
          name: conversationId
          schema:
            type: string
          required: true
      responses:
        "201":
          description: Message created
  /leads:
    get:
      summary: List leads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lead list
    post:
      summary: Create lead
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Lead created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
